    <title>Twitch ライブ配信検索</title>
    <script>
        // Apply theme immediately to prevent flash (Default: Dark)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme !== 'light') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
</head>
